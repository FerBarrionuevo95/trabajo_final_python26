{% extends "base.html" %}

{% block content %}
<article class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-10">
            <header class="mb-4">
                <h1 class="fw-bolder mb-1">{{ post.titulo }}</h1>
                <p class="text-primary lead">{{ post.subtitulo }}</p>
                <div class="text-muted fst-italic mb-2">
                    Publicado el {{ post.fecha|date:"d de F, Y" }} por <strong>{{ post.autor.username }}</strong>
                </div>
            </header>

            {% if post.imagen %}
                <figure class="mb-4">
                    <img class="img-fluid rounded shadow" src="{{ post.imagen.url }}" alt="{{ post.titulo }}" style="width: 100%; max-height: 500px; object-fit: cover;" />
                </figure>
            {% endif %}

            <section class="mb-5 lh-lg fs-5">
                {{ post.cuerpo|safe }}
            </section>
            
            <hr>
            <a href="{% url 'Home' %}" class="btn btn-secondary mb-5">Volver al inicio</a>
        </div>
    </div>
</article>
{% endblock %}
